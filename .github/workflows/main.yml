name: Mon Premier CI

on:
    push:
        branches: [ "main" ]

jobs:
    deploy:
        runs-on: ubuntu-22.04
        steps:
            - name: Déploiement via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  script: |
                      cd ${{ secrets.SSH_APP }}
                      git pull origin main
